name: Dependencies Check

on:
  push:
    branches: [main, develop]
    paths:
      - "**/go.mod"
      - "**/go.sum"
      - ".github/workflows/dependencies.yml"
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 0 * * 0" # Weekly on Sunday

jobs:
  dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: "**/go.sum"

      - name: Download dependencies
        run: go mod download

      - name: Check for outdated dependencies
        run: |
          echo "=== Checking for available updates ==="
          go list -u -m all

      - name: Verify go.mod and go.sum integrity
        run: |
          go mod verify
          echo "✅ go.mod and go.sum are valid"

      - name: Tidy go.mod
        run: |
          go mod tidy
          if [ -n "$(git diff --name-only)" ]; then
            echo "❌ go.mod or go.sum needs updating"
            git diff
            exit 1
          fi
          echo "✅ go.mod and go.sum are clean"

      - name: Check for unused dependencies
        run: |
          go mod graph | grep -v ' ' | sort | uniq
          echo "✅ Dependency check completed"

      - name: Verify all packages can be imported
        run: |
          go test -run=^$ ./...
          echo "✅ All packages are importable"

  security-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: "**/go.sum"

      - name: Run go vet for potential security issues
        run: |
          go vet ./...
          echo "✅ Static analysis for security completed"

      - name: Check for obvious security patterns
        run: |
          echo "=== Checking for common security issues ==="
          ! grep -r "hardcoded.*password\|hardcoded.*secret\|hardcoded.*token" --include="*.go" . 2>/dev/null || echo "⚠️  Review hardcoded credentials"
          echo "✅ Security pattern check completed"

  report:
    runs-on: ubuntu-latest
    needs: [dependencies, security-check]
    if: always()

    steps:
      - name: Dependency check summary
        run: |
          echo "## Dependency Check Results"
          echo "- Dependencies: ${{ needs.dependencies.result }}"
          echo "- Security: ${{ needs.security-check.result }}"

      - name: Fail if critical issues
        if: |
          needs.dependencies.result == 'failure' ||
          needs.security-check.result == 'failure'
        run: |
          echo "❌ Dependency or security check failed"
          exit 1
