name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dimulai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: "**/go.sum"

      - name: Create .env.test
        run: |
          cat > .env.test << EOF
          SERVER_PORT=8080
          SERVER_READ_TIMEOUT=30s
          SERVER_WRITE_TIMEOUT=30s
          SERVER_IDLE_TIMEOUT=120s
          SERVER_SHUTDOWN_TIMEOUT=10s

          DB_WRITE_HOST=localhost
          DB_READ_HOSTS=localhost
          DB_PORT=5432
          DB_NAME=dimulai_test
          DB_USER=postgres
          DB_PASSWORD=postgres
          DB_MAX_CONNS=25
          DB_SSL_MODE=disable

          JWT_SECRET=test-secret-key-for-testing-purposes-only-256bit
          JWT_ACCESS_TOKEN_EXPIRY=15m
          JWT_REFRESH_TOKEN_EXPIRY=168h
          JWT_SIGNING_METHOD=HS256

          MAIL_FROM=test@example.com
          MAIL_TRANSPORT=null
          MAIL_APP_NAME=Dimulai Test
          MAIL_PRIMARY_COLOR=#007bff

          CORS_ALLOWED_ORIGINS=*
          CORS_ALLOWED_METHODS=GET,POST,PUT,DELETE,OPTIONS
          CORS_ALLOWED_HEADERS=Content-Type,Authorization
          EOF

      - name: Wait for PostgreSQL
        run: |
          until PGPASSWORD=postgres psql -h localhost -U postgres -d dimulai_test -c '\q'; do
            echo 'Waiting for PostgreSQL...'
            sleep 1
          done
        env:
          PGPASSWORD: postgres

      - name: Download dependencies
        run: go mod download

      - name: Run tests with race detection
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Generate coverage report
        run: go tool cover -func=coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Verify code formatting
        run: |
          if [ "$(gofmt -s -l . | grep -v vendor | wc -l)" -gt 0 ]; then
            echo "❌ Code formatting issues found:"
            gofmt -s -d .
            exit 1
          fi
          echo "✅ Code formatting is correct"

      - name: Run go vet analysis
        run: |
          go vet ./...
          echo "✅ Static analysis passed"

      - name: Build application
        run: |
          cd cmd/app
          go build -v -o dimulai .
          if [ ! -f dimulai ]; then
            echo "❌ Build failed: dimulai binary not found"
            exit 1
          fi
          echo "✅ Build successful"
