{{define "table"}}
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="margin:16px 0;border:1px solid #eee;border-radius:4px;">
  {{if .Headers}}
  <tr>
    {{range .Headers}}
    <th style="padding:12px;background:#f5f5f5;text-align:left;font-size:12px;font-weight:600;color:#666;border-bottom:1px solid #eee;">{{.}}</th>
    {{end}}
  </tr>
  {{end}}
  {{range .Rows}}
  <tr>
    {{range .}}
    <td style="padding:12px;font-size:14px;color:#333;border-bottom:1px solid #eee;">{{.}}</td>
    {{end}}
  </tr>
  {{end}}
</table>
{{end}}
