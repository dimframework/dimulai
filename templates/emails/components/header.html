{{define "header"}}
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
  <tr>
    <td align="center" style="padding:32px 40px;border-bottom:1px solid #eee;">
      {{if .LogoURL.Valid}}
      <img src="{{.LogoURL.Value}}" alt="{{.AppName}}" style="max-height:48px;max-width:200px;">
      {{else}}
      <span style="font-size:24px;font-weight:700;color:{{.PrimaryColor}};">{{.AppName}}</span>
      {{end}}
    </td>
  </tr>
</table>
{{end}}
